worker_processes auto;
events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  sendfile      on;
  tcp_nopush    on;
  tcp_nodelay   on;
  keepalive_timeout 65;

  server_tokens off;

  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_types
    text/plain
    text/css
    text/xml
    text/javascript
    application/json
    application/javascript
    application/xml
    application/xml+rss
    application/wasm
    image/svg+xml;

  upstream api_backend {
    server api:8080;
    keepalive 32;
  }

  server {
    listen 80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 10M;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(self), microphone=(), camera=()" always;

    # Service worker — never cache so PWA updates roll out immediately
    location = /service-worker.js {
      add_header Cache-Control "no-cache, no-store, must-revalidate";
      add_header Pragma "no-cache";
      expires 0;
      try_files $uri =404;
    }

    location = /manifest.webmanifest {
      add_header Cache-Control "no-cache";
      try_files $uri =404;
    }

    # Hashed static assets — long cache (Vite fingerprints filenames)
    location /assets/ {
      expires 1y;
      add_header Cache-Control "public, immutable";
      try_files $uri =404;
    }

    location ~* \.(?:woff2?|ttf|eot|otf)$ {
      expires 1y;
      add_header Cache-Control "public, immutable";
      try_files $uri =404;
    }

    # API → Express container
    location /api/ {
      proxy_pass         http://api_backend;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_set_header   Connection        "";

      proxy_connect_timeout 30s;
      proxy_send_timeout    60s;
      proxy_read_timeout    60s;
    }

    # Uncomment if/when Clerk's frontend proxy feature is enabled
    # (frontend env: VITE_CLERK_PROXY_URL=https://<your-domain>/clerk)
    # location /clerk/ {
    #   proxy_pass         http://api_backend;
    #   proxy_http_version 1.1;
    #   proxy_set_header   Host              $host;
    #   proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    #   proxy_set_header   X-Forwarded-Proto $scheme;
    # }

    # SPA fallback — Wouter handles client-side routing
    location / {
      add_header Cache-Control "no-cache";
      try_files $uri $uri/ /index.html;
    }
  }
}
