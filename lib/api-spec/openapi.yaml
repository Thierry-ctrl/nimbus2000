        destinationId: { type: string }
        departureDate: { type: string, format: date }
        departureTime: { type: string }
        windowEndTime: { type: string, nullable: true }
        pickupPoint: { type: string, nullable: true }
        flexMinutes: { type: integer, enum: [5, 10, 15] }
        seats: { type: integer, minimum: 1, maximum: 4 }
        sameGenderOnly: { type: boolean, default: false }
        notes: { type: string, nullable: true }

    CancelTripBody:
      type: object
      properties:
        reason: { type: string, nullable: true }

    RecurringTrip:
      type: object
      required: [id, driverId, originId, destinationId, daysOfWeek, departureTime, flexMinutes, seats, active]
      properties:
        id: { type: string }
        driverId: { type: string }
        originId: { type: string }
        originName: { type: string }
        destinationId: { type: string }
        destinationName: { type: string }
        daysOfWeek:
          type: array
          items: { type: integer, minimum: 0, maximum: 6 }
        departureTime: { type: string }
        flexMinutes: { type: integer, enum: [5, 10, 15] }
        seats: { type: integer, minimum: 1, maximum: 4 }
        sameGenderOnly: { type: boolean }
        notes: { type: string, nullable: true }
        active: { type: boolean }

    CreateRecurringTripBody:
      type: object
      required: [originId, destinationId, daysOfWeek, departureTime, flexMinutes, seats]
      properties:
        originId: { type: string }
        destinationId: { type: string }
        daysOfWeek:
          type: array
          items: { type: integer, minimum: 0, maximum: 6 }
        departureTime: { type: string }
        flexMinutes: { type: integer, enum: [5, 10, 15] }
        seats: { type: integer, minimum: 1, maximum: 4 }
        sameGenderOnly: { type: boolean, default: false }
        notes: { type: string, nullable: true }

    MatchResult:
      type: object
      required: [trip, matchScore, timeOverlapMinutes]
      properties:
        trip: { $ref: "#/components/schemas/Trip" }
        matchScore: { type: number, description: "0-100" }
        timeOverlapMinutes: { type: integer }

    NearbyMatch:
      type: object
      required: [trip, timeOverlapMinutes, proximityKm, destinationName]
      description: |
        Trip from the same origin going to a different but nearby destination.
        Sorted by proximityKm ascending. Useful when no exact destination match exists.
      properties:
        trip: { $ref: "#/components/schemas/Trip" }
        timeOverlapMinutes: { type: integer }
        proximityKm: { type: number, description: "Distance from this trip's destination to the rider's requested destination" }
        destinationName: { type: string }

    MatchesResponse:
      type: object
      required: [matches, nearby]
      properties:
        matches:
          type: array
          items: { $ref: "#/components/schemas/MatchResult" }
        nearby:
          type: array
          items: { $ref: "#/components/schemas/NearbyMatch" }

    RideRequest:
      type: object
