        topCorridors:
          type: array
          items:
            type: object
            required: [corridorLabel, rides]
            properties:
              corridorLabel: { type: string }
              rides: { type: integer }
        createdAt: { type: string, format: date-time }

    FeeStatus:
      type: string
      enum: [unpaid, paid, waived, refunded]

