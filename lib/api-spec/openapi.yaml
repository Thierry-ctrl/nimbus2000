openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: KigaliWeShare API — neighbor-to-neighbor carpool matching for Kigali commuters
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: invites
  - name: profile
  - name: catalog
  - name: trips
  - name: requests
  - name: ratings
  - name: dashboard
  - name: admin
  - name: payments

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HealthStatus" }

  /invites/redeem:
    post:
      operationId: redeemInvite
      tags: [invites]
      summary: Redeem an invite code (called during onboarding)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RedeemInviteBody" }
      responses:
        "200":
          description: Code accepted
          content:
            application/json:
              schema: { $ref: "#/components/schemas/InviteRedemption" }
        "400": { description: Invalid or already used code }

  /catalog/neighborhoods:
    get:
      operationId: listNeighborhoods
      tags: [catalog]
      summary: All seeded Kigali neighborhoods
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Neighborhood" }

  /catalog/corridors:
    get:
      operationId: listCorridors
      tags: [catalog]
      summary: Pilot commute corridors
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Corridor" }

  /catalog/config:
    get:
      operationId: getPublicConfig
      tags: [catalog]
      summary: Public config (current fuel price, brand values)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PublicConfig" }

  /profile/me:
    get:
      operationId: getMyProfile
      tags: [profile]
      summary: Get the current user's profile
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Profile" }
        "404": { description: No profile yet (needs onboarding) }
    put:
      operationId: upsertMyProfile
      tags: [profile]
      summary: Create or update the current user's profile (onboarding)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpsertProfileBody" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Profile" }

  /profile/me/vehicle:
    put:
      operationId: upsertMyVehicle
      tags: [profile]
      summary: Create or update the driver's vehicle
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpsertVehicleBody" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Vehicle" }

  /profile/{userId}:
    get:
      operationId: getUserProfile
      tags: [profile]
      summary: Public-ish profile for another user (rating, completed trips, vehicle)
      parameters:
        - in: path
          name: userId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PublicProfile" }
        "404": { description: Not found }

  /trips:
    get:
      operationId: listMyTrips
      tags: [trips]
      summary: List the current driver's trips
      parameters:
        - in: query
          name: scope
          schema:
            type: string
            enum: [upcoming, past, all]
            default: upcoming
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Trip" }
    post:
      operationId: createTrip
      tags: [trips]
      summary: Post a one-off driver trip
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateTripBody" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Trip" }

  /trips/quick-post-defaults:
    get:
      operationId: getQuickPostDefaults
      tags: [trips]
      summary: Origin/destination from driver's most-used corridor
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/QuickPostDefaults" }

  /trips/{tripId}:
    get:
      operationId: getTrip
      tags: [trips]
      parameters:
        - in: path
          name: tripId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TripDetail" }

  /trips/{tripId}/cancel:
    post:
      operationId: cancelTrip
      tags: [trips]
      parameters:
        - in: path
          name: tripId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CancelTripBody" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Trip" }

  /trips/{tripId}/start:
    post:
      operationId: startTrip
      tags: [trips]
      parameters:
        - in: path
          name: tripId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Trip" }

  /trips/{tripId}/complete:
    post:
      operationId: completeTrip
      tags: [trips]
      parameters:
        - in: path
          name: tripId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Trip" }

  /recurring-trips:
    get:
      operationId: listMyRecurringTrips
      tags: [trips]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/RecurringTrip" }
    post:
      operationId: createRecurringTrip
      tags: [trips]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateRecurringTripBody" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RecurringTrip" }

  /recurring-trips/{recurringId}:
    delete:
      operationId: deleteRecurringTrip
      tags: [trips]
      parameters:
        - in: path
          name: recurringId
          required: true
          schema: { type: string }
      responses:
        "204": { description: Deleted }

  /matches:
    get:
      operationId: findMatches
      tags: [trips]
      summary: Match driver trips to a rider's intent (corridor + window)
      parameters:
        - in: query
          name: originId
          required: true
          schema: { type: string }
        - in: query
          name: destinationId
          required: true
          schema: { type: string }
        - in: query
          name: date
          required: true
          schema: { type: string, format: date }
        - in: query
          name: windowStart
          required: true
          schema: { type: string, description: "HH:MM" }
        - in: query
          name: windowEnd
          required: true
          schema: { type: string, description: "HH:MM" }
        - in: query
          name: sameGenderOnly
          schema: { type: boolean, default: false }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MatchesResponse" }

  /requests:
    get:
      operationId: listMyRideRequests
      tags: [requests]
      summary: Rides the current rider has requested
      parameters:
        - in: query
          name: scope
          schema:
            type: string
            enum: [upcoming, past, all]
            default: upcoming
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/RideRequest" }
    post:
      operationId: createRideRequest
      tags: [requests]
      summary: Rider requests a seat on a specific trip
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateRideRequestBody" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RideRequest" }

  /requests/{requestId}/approve:
    post:
      operationId: approveRideRequest
      tags: [requests]
      parameters:
        - in: path
          name: requestId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RideRequest" }

  /requests/{requestId}/decline:
    post:
      operationId: declineRideRequest
      tags: [requests]
      parameters:
        - in: path
          name: requestId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RideRequest" }

  /requests/{requestId}/cancel:
    post:
      operationId: cancelRideRequest
      tags: [requests]
      parameters:
        - in: path
          name: requestId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RideRequest" }

  /ratings:
    post:
      operationId: createRating
      tags: [ratings]
      summary: Rate the other party after a completed trip
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateRatingBody" }
      responses:
        "201":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Rating" }

  /payments/initiate:
    post:
      operationId: initiateServiceFeePayment
      tags: [payments]
      summary: Start a MoMo Collections RequestToPay for the rider's service fee
      description: |
        Triggers a MoMo Collections API RequestToPay against the rider's phone.
        Requires the ride request to be approved. The fuel share is paid OUT
        of band (rider→driver MoMo P2P or cash) and is never touched by this
        endpoint.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PaymentInitiateBody" }
      responses:
        "200":
          description: Payment initiated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PaymentInitiateResponse" }
        "400": { description: Invalid request }
        "403": { description: Forbidden }
        "409": { description: Fee already paid or refunded }
        "503": { description: Service fee not enabled }

  /payments/callback:
    post:
      operationId: momoPaymentCallback
      tags: [payments]
      summary: Webhook receiver for MoMo Collections payment status updates
      description: |
        Called by MTN MoMo to confirm payment success/failure. Validates the
        callback signature before updating fee state.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PaymentCallbackPayload" }
      responses:
        "200": { description: Acknowledged }
        "400": { description: Invalid payload }
        "401": { description: Invalid signature }

  /payments/{rideRequestId}/status:
    get:
      operationId: getServiceFeeStatus
      tags: [payments]
      summary: Current payment status for a ride request's service fee
      parameters:
        - in: path
          name: rideRequestId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PaymentStatusResponse" }
        "404": { description: Not found }

  /payments/cash-fee/{rideRequestId}:
    post:
      operationId: recordCashFee
      tags: [payments]
      summary: Mark a service fee as paid via cash fallback when MoMo is unavailable
      parameters:
        - in: path
          name: rideRequestId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PaymentStatusResponse" }
        "403": { description: Forbidden }
        "409": { description: Already settled }

  /admin/payments/{feeId}/refund:
    post:
      operationId: refundServiceFee
      tags: [payments, admin]
      summary: Mark a service fee as refunded (admin only)
      parameters:
        - in: path
          name: feeId
          required: true
          schema: { type: string }
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RefundFeeBody" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ServiceFeeRecord" }
        "404": { description: Not found }

  /admin/revenue:
    get:
      operationId: getRevenueStats
      tags: [admin, payments]
      summary: Aggregated revenue + payment health stats (admin)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RevenueStats" }

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Personalized dashboard for the current user (driver+rider stats, fuel saved, next trip, pending requests)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DashboardSummary" }

  /dashboard/activity:
    get:
      operationId: getRecentActivity
      tags: [dashboard]
      summary: Recent activity feed for the current user
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/ActivityItem" }

  /dashboard/rating-prompts:
    get:
      operationId: listRatingPrompts
      tags: [dashboard]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/RatingPrompt" }

  /dashboard/rating-prompts/{tripId}/dismiss:
    post:
      operationId: dismissRatingPrompt
      tags: [dashboard]
      parameters:
        - in: path
          name: tripId
          required: true
          schema: { type: string }
      responses:
        "204": { description: Dismissed }

  /notifications/subscribe:
    post:
      operationId: subscribePush
      tags: [notifications]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PushSubscribeBody" }
      responses:
        "201":
          description: Subscribed
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
    delete:
      operationId: unsubscribePush
      tags: [notifications]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PushUnsubscribeBody" }
      responses:
        "204": { description: Unsubscribed }

  /reports:
    post:
      operationId: createReport
      tags: [reports]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateReportBody" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Report" }

  /admin/reports:
    get:
      operationId: listAdminReports
      tags: [admin]
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum: [open, reviewing, resolved, dismissed, all]
            default: open
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/AdminReport" }

  /admin/reports/{id}:
    put:
      operationId: updateAdminReport
      tags: [admin]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateReportBody" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AdminReport" }

  /admin/invite-analytics:
    get:
      operationId: getInviteAnalytics
      tags: [admin]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/InviteAnalytics" }

  /admin/export/users.csv:
    get:
      operationId: exportUsersCsv
      tags: [admin]
      responses:
        "200":
          description: CSV
          content:
            text/csv:
              schema: { type: string }

  /admin/export/trips.csv:
    get:
      operationId: exportTripsCsv
      tags: [admin]
      responses:
        "200":
          description: CSV
          content:
            text/csv:
              schema: { type: string }

  /admin/users/{userId}/id-verified:
    post:
      operationId: setUserIdVerified
      tags: [admin]
      parameters:
        - in: path
          name: userId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SetIdVerifiedBody" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [userId, idVerified]
                properties:
                  userId: { type: string }
                  idVerified: { type: boolean }

  /admin/stats:
    get:
      operationId: getAdminStats
      tags: [admin]
      summary: Pilot operator stats — WAU, matches/day, rides completed, no-show rate
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AdminStats" }

  /admin/users:
    get:
      operationId: listAdminUsers
      tags: [admin]
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum: [pending, verified, all]
            default: all
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/AdminUserRow" }

  /admin/users/{userId}/verify:
    post:
      operationId: verifyUser
      tags: [admin]
      parameters:
        - in: path
          name: userId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/VerifyUserBody" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AdminUserRow" }

  /admin/invites:
    get:
      operationId: listInvites
      tags: [admin]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/InviteCode" }
    post:
      operationId: createInvite
      tags: [admin]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateInviteBody" }
      responses:
        "201":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/InviteCode" }

  /admin/neighborhoods:
    post:
      operationId: createAdminNeighborhood
      tags: [admin]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateNeighborhoodBody" }
      responses:
        "201":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Neighborhood" }

  /admin/neighborhoods/{id}:
    put:
      operationId: updateAdminNeighborhood
      tags: [admin]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateNeighborhoodBody" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Neighborhood" }
    delete:
      operationId: deleteAdminNeighborhood
      tags: [admin]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "204": { description: Deleted }

  /admin/corridors:
    post:
      operationId: createAdminCorridor
      tags: [admin]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateCorridorBody" }
      responses:
        "201":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Corridor" }

  /admin/corridors/{id}:
    put:
      operationId: updateAdminCorridor
      tags: [admin]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateCorridorBody" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Corridor" }
    delete:
      operationId: deleteAdminCorridor
      tags: [admin]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "204": { description: Deleted }

  /admin/config:
    put:
      operationId: updateConfig
      tags: [admin]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateConfigBody" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PublicConfig" }

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status: { type: string }

    Gender:
      type: string
      enum: [female, male, other, prefer_not_to_say]

    Role:
      type: string
      enum: [rider, driver, both]

    AccountStatus:
      type: string
      enum: [pending, verified, suspended]

    TripStatus:
      type: string
      enum: [scheduled, in_progress, completed, cancelled]

    RideRequestStatus:
      type: string
      enum: [pending, approved, declined, cancelled, completed]

    Neighborhood:
      type: object
      required: [id, name]
      properties:
        id: { type: string }
        name: { type: string }
        sector: { type: string, nullable: true }

    Corridor:
      type: object
      required: [id, label, originId, destinationId, distanceKm]
      properties:
        id: { type: string }
        label: { type: string, description: "e.g. Remera \u2013 CBD" }
        originId: { type: string }
        destinationId: { type: string }
        distanceKm: { type: number }

    PublicConfig:
      type: object
      required: [fuelPriceRwfPerLitre, dieselPriceRwfPerLitre, vehicleConsumptionLPer100Km, currencyCode, serviceFeeEnabled, serviceFeePct]
      properties:
        fuelPriceRwfPerLitre: { type: number }
        dieselPriceRwfPerLitre: { type: number }
        vehicleConsumptionLPer100Km: { type: number }
        currencyCode: { type: string, description: "e.g. RWF" }
        rnpEmergencyNumber: { type: string }
        vapidPublicKey: { type: string }
        serviceFeeEnabled:
          type: boolean
          description: |
            Kill switch for the platform service fee. When false, clients MUST
            hide all fee UI and treat fee fields as absent. Backward-compatible
            with pre-monetization clients.
