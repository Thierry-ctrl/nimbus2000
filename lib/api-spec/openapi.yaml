    Trip:
      type: object
      required:
        [id, driverId, originId, destinationId, departureDate, departureTime, flexMinutes, seatsTotal, seatsRemaining, status]
      properties:
        id: { type: string }
        driverId: { type: string }
        driverName: { type: string }
        driverRating: { type: number, nullable: true }
        originId: { type: string }
        originName: { type: string }
        destinationId: { type: string }
        destinationName: { type: string }
        departureDate: { type: string, format: date }
        departureTime: { type: string, description: "HH:MM (window start)" }
        windowEndTime: { type: string, nullable: true, description: "HH:MM (window end)" }
        pickupPoint: { type: string, nullable: true }
        flexMinutes: { type: integer, enum: [5, 10, 15] }
        seatsTotal: { type: integer }
        seatsRemaining: { type: integer }
        sameGenderOnly: { type: boolean }
        notes: { type: string, nullable: true }
        status: { $ref: "#/components/schemas/TripStatus" }
        cancelReason: { type: string, nullable: true }
        fuelShare:
          oneOf:
            - { $ref: "#/components/schemas/FuelShare" }
            - { type: "null" }
        serviceFeePerRider:
          type: integer
          nullable: true
          description: |
            Per-rider platform service fee snapshot, computed at trip-post time.
            Only populated when serviceFeeEnabled is true. NEVER summed with the
            fuel share — the two amounts must be displayed as separate line items.
        feeBreakdown:
          oneOf:
            - { $ref: "#/components/schemas/FeeBreakdown" }
            - { type: "null" }

    FuelShare:
      type: object
      required:
        [distanceKm, pricePerLitreRwf, consumptionLPer100Km, fuelCostRwf, perPassengerRwf, driverPaysRwf, totalRiderShareRwf]
      description: |
        Suggested fuel cost-share for the trip. KigaliWeShare does not process payments;
        riders pay drivers directly (MoMo / cash). Per-rider amount can never exceed an
        equal split, ensuring this stays a non-commercial cost-share.
      properties:
        distanceKm: { type: number }
        pricePerLitreRwf: { type: number }
        consumptionLPer100Km: { type: number }
        fuelCostRwf: { type: number, description: "Total fuel cost for the whole trip" }
        perPassengerRwf: { type: number, description: "Suggested contribution per rider, rounded to 100 RWF" }
        driverPaysRwf: { type: number, description: "Driver's own out-of-pocket after rider contributions" }
        totalRiderShareRwf: { type: number }

    TripDetail:
      allOf:
        - $ref: "#/components/schemas/Trip"
        - type: object
          properties:
            vehicle:
              oneOf:
                - { $ref: "#/components/schemas/Vehicle" }
                - { type: "null" }
            driverPhone: { type: string, nullable: true, description: "Revealed only to approved riders" }
            requests:
              type: array
              items: { $ref: "#/components/schemas/RideRequest" }

    CreateTripBody:
      type: object
      required: [originId, destinationId, departureDate, departureTime, flexMinutes, seats]
