      type: string
      enum: [pending, success, failed, refunded]

    FeeBreakdown:
      type: object
      required: [fuelShareRwf, serviceFeeRwf, totalRiderPaysRwf, feePercentage, disclaimerText]
      description: |
        Cost breakdown shown to riders. The fuel share and service fee MUST be
        displayed as separate visual blocks — never summed into a single price.
        This is the regulatory boundary between cost-sharing (off-platform) and
        platform service (on-platform).
      properties:
        fuelShareRwf:
          type: integer
          description: Per-rider fuel share (paid directly to driver, off-platform)
        serviceFeeRwf:
          type: integer
          description: Per-rider service fee (paid to KigaliWeShare, on-platform)
        totalRiderPaysRwf:
          type: integer
          description: Sum shown for transparency only — NOT collected as a single charge
        feePercentage: { type: integer }
        disclaimerText: { type: string }

    PaymentInitiateBody:
      type: object
      required: [rideRequestId, payerPhone]
      properties:
        rideRequestId: { type: string }
        payerPhone: { type: string, description: "MoMo MSISDN, e.g. 2507XXXXXXXX" }
        paymentMethod:
          oneOf:
            - { $ref: "#/components/schemas/PaymentMethod" }
            - { type: "null" }

    PaymentInitiateResponse:
      type: object
      required: [feeId, momoReferenceId, status, amountRwf]
      properties:
        feeId: { type: string }
        momoReferenceId: { type: string }
        status: { $ref: "#/components/schemas/MomoStatus" }
        amountRwf: { type: integer }

    PaymentStatusResponse:
      type: object
      required: [rideRequestId, serviceFeeStatus, amountRwf]
      properties:
        rideRequestId: { type: string }
        feeId: { type: string, nullable: true }
        serviceFeeStatus: { $ref: "#/components/schemas/FeeStatus" }
        momoStatus:
          oneOf:
            - { $ref: "#/components/schemas/MomoStatus" }
            - { type: "null" }
        paymentMethod:
          oneOf:
            - { $ref: "#/components/schemas/PaymentMethod" }
            - { type: "null" }
        amountRwf: { type: integer }
        failureReason: { type: string, nullable: true }
        paidAt: { type: string, format: date-time, nullable: true }

    PaymentCallbackPayload:
      type: object
      required: [referenceId, status]
      description: MTN MoMo Collections webhook payload (validated by signature)
      properties:
        referenceId: { type: string }
        status: { type: string, description: "MoMo status — SUCCESSFUL, FAILED, etc." }
        financialTransactionId: { type: string, nullable: true }
        reason: { type: string, nullable: true }

    RefundFeeBody:
